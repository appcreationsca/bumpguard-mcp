<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BumpGuard logo">
  <title>BumpGuard</title>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2128"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78e68c"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Shield = "Guard": dark body with a green rim -->
  <path d="M256 40 L432 104 V268 C432 360 352 432 256 472 C160 432 80 360 80 268 V104 Z"
        fill="url(#body)" stroke="#3fb950" stroke-width="18" stroke-linejoin="round"
        filter="url(#shadow)"/>
  <!-- Checkmark = "verified safe to upgrade" -->
  <path d="M184 264 L238 318 L352 192" fill="none" stroke="url(#check)"
        stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
